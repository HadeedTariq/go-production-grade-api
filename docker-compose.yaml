version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: daily_dev_go_postgres
    restart: always
    environment:
      POSTGRES_DB: daily-dev-db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: daily_dev_go_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
